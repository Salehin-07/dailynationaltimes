{% load static %}
{% include 'partials/dash_head.html' with active='password' title='Change Password' %}
  {% if messages %}
    {% for m in messages %}<div class="dash-msg"><i class="bi bi-check-circle me-1"></i> {{ m }}</div>{% endfor %}
  {% endif %}

  <section class="dash-card">
    <div class="dash-card-head">
      <h2 class="dash-card-title">Change Password</h2>
    </div>
    <div style="padding:20px;">
      <form class="dash-form" method="post">
        {% csrf_token %}
        {{ form.as_div }}
        <div class="dash-form-actions">
          <button type="submit" class="dash-btn"><i class="bi bi-check-lg"></i> Update Password</button>
          <a href="{% url 'accounts:profile' %}" class="dash-btn-ghost"><i class="bi bi-x-lg"></i> Cancel</a>
        </div>
      </form>
    </div>
  </section>
{% include 'partials/dash_foot.html' %}
